<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Stok Omaji</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --green-dark: #1a3d1c;
            --green-mid: #2e6b31;
            --green-light: #e8f5e9;
            --green-accent: #43a047;

            --safe: #2e7d32;
            --safe-bg: #e8f5e9;
            --safe-border: #a5d6a7;

            --warn: #e65100;
            --warn-bg: #fff3e0;
            --warn-border: #ffcc80;

            --danger: #c62828;
            --danger-bg: #ffebee;
            --danger-border: #ef9a9a;

            --bg: #f0f4f0;
            --surface: #ffffff;
            --surface2: #f7faf7;
            --border: #e0e8e0;
            --text: #1a2a1a;
            --muted: #6b7f6b;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 2px 12px rgba(30,60,30,0.08);
            --shadow-md: 0 4px 24px rgba(30,60,30,0.12);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ── HEADER ── */
        .app-header {
            background: var(--green-dark);
            padding: 16px 20px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left { display: flex; align-items: center; gap: 10px; }

        .logo-mark {
            width: 36px; height: 36px;
            background: var(--green-accent);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 700; color: #fff;
            letter-spacing: -1px;
        }

        .app-title { color: #fff; font-size: 16px; font-weight: 700; line-height: 1.1; }
        .app-sub { color: rgba(255,255,255,0.55); font-size: 11px; font-weight: 500; }

        .live-pill {
            display: flex; align-items: center; gap: 5px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 5px 10px;
            font-size: 11px; color: rgba(255,255,255,0.85); font-weight: 600;
        }

        .live-dot {
            width: 7px; height: 7px;
            background: #69f0ae;
            border-radius: 50%;
            animation: blink 1.4s ease infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }

        /* ── CONTROLS BAR (filter + date sejajar) ── */
        .controls-bar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ctrl-select {
            flex: 1;
            min-width: 0;
            padding: 8px 32px 8px 10px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background-color: var(--surface2);
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            outline: none;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236b7f6b' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 14px;
            transition: border-color 0.2s;
        }

        .ctrl-select:focus { border-color: var(--green-mid); }

        .ctrl-date {
            flex: 1;
            min-width: 0;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--surface2);
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            padding: 8px 10px;
            outline: none;
            transition: border-color 0.2s;
        }

        .ctrl-date:focus { border-color: var(--green-mid); }

        .ctrl-divider {
            width: 1px; height: 28px;
            background: var(--border);
            flex-shrink: 0;
        }

        /* ── STATS ROW ── */
        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            padding: 0 16px 12px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            user-select: none;
            -webkit-user-select: none;
        }

        .stat-card:active { transform: scale(0.96); }

        .stat-card.aman:hover { border-color: var(--safe-border); background: var(--safe-bg); }
        .stat-card.warn:hover { border-color: var(--warn-border); background: var(--warn-bg); }
        .stat-card.hbs:hover { border-color: var(--danger-border); background: var(--danger-bg); }

        .stat-num { font-size: 22px; font-weight: 700; line-height: 1; }
        .stat-lbl { font-size: 10px; font-weight: 600; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.4px; }

        .stat-card.aman .stat-num { color: var(--safe); }
        .stat-card.warn .stat-num { color: var(--warn); }
        .stat-card.hbs .stat-num { color: var(--danger); }

        /* ── STOCK LIST ── */
        .stock-list {
            flex: 1;
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-bottom: 100px;
        }

        #loading {
            text-align: center;
            padding: 48px 16px;
            color: var(--muted);
            font-size: 14px;
            font-weight: 500;
        }

        .spinner {
            width: 28px; height: 28px;
            border: 3px solid var(--border);
            border-top-color: var(--green-mid);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .item-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 13px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: transform 0.15s, box-shadow 0.15s;
            position: relative;
            overflow: hidden;
        }

        .item-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            background: var(--safe-border);
            border-radius: 4px 0 0 4px;
        }

        .item-card.warning-stock { background: var(--warn-bg); border-color: var(--warn-border); }
        .item-card.warning-stock::before { background: var(--warn); }
        .item-card.danger-stock { background: var(--danger-bg); border-color: var(--danger-border); }
        .item-card.danger-stock::before { background: var(--danger); }

        .item-card:active { transform: scale(0.99); }

        .item-icon {
            width: 38px; height: 38px; flex-shrink: 0;
            border-radius: 10px;
            background: var(--green-light);
            display: flex; align-items: center; justify-content: center;
            font-size: 17px;
        }

        .item-card.warning-stock .item-icon { background: var(--warn-bg); }
        .item-card.danger-stock .item-icon { background: var(--danger-bg); }

        .item-info { flex: 1; min-width: 0; }
        .item-name {
            font-size: 14px; font-weight: 600;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .item-category {
            font-size: 11px; color: var(--muted); font-weight: 500; margin-top: 2px;
        }

        .item-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

        .status-btn {
            font-family: inherit;
            font-size: 11px; font-weight: 700;
            padding: 5px 10px;
            border-radius: 20px;
            border: 1.5px solid;
            cursor: pointer;
            transition: all 0.18s;
            white-space: nowrap;
            min-width: 80px;
            text-align: center;
        }

        .status-btn.aman {
            background: var(--safe-bg); color: var(--safe); border-color: var(--safe-border);
        }
        .status-btn.hampir {
            background: var(--warn-bg); color: var(--warn); border-color: var(--warn-border);
        }
        .status-btn.habis {
            background: var(--danger-bg); color: var(--danger); border-color: var(--danger-border);
        }

        .icon-btn {
            width: 30px; height: 30px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface2);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: var(--muted);
            transition: all 0.18s;
            flex-shrink: 0;
        }

        .icon-btn:active { transform: scale(0.92); }
        .edit-btn:active { color: #1565c0; border-color: #90caf9; background: #e3f2fd; }
        .delete-btn:active { color: var(--danger); border-color: var(--danger-border); background: var(--danger-bg); }

        /* ── FAB ── */
        .fab {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 54px; height: 54px;
            background: var(--green-dark);
            color: #fff;
            border: none;
            border-radius: 16px;
            box-shadow: 0 6px 20px rgba(26,61,28,0.35);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; font-weight: 300;
            transition: all 0.2s;
            z-index: 50;
        }

        .fab:active { transform: scale(0.93); }

        /* ── BOTTOM NAV ── */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: grid;
            grid-template-columns: 1fr 1fr;
            z-index: 60;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-btn {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 3px;
            padding: 10px 8px;
            border: none; background: transparent;
            cursor: pointer;
            font-family: inherit;
            font-size: 11px; font-weight: 600;
            color: var(--muted);
            transition: color 0.2s;
        }

        .nav-btn svg { width: 20px; height: 20px; }
        .nav-btn:active { color: var(--green-mid); }

        .nav-btn.wa { color: #1b7a3f; }
        .nav-btn.wa:active { color: #0a4f27; }

        /* ── MODALS ── */
        .modal-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(10,30,10,0.45);
            z-index: 200;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .modal-overlay.open { display: flex; animation: fadeOverlay 0.2s ease; }
        @keyframes fadeOverlay { from { opacity: 0; } to { opacity: 1; } }

        .modal-sheet {
            background: var(--surface);
            border-radius: 24px 24px 0 0;
            width: 100%;
            max-width: 480px;
            max-height: 92dvh;
            overflow-y: auto;
            padding: 20px 20px 28px;
            animation: slideUp 0.25s cubic-bezier(0.34,1.1,0.64,1);
        }

        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .sheet-handle {
            width: 36px; height: 4px;
            background: var(--border);
            border-radius: 4px;
            margin: 0 auto 18px;
        }

        .sheet-title {
            font-size: 17px; font-weight: 700;
            margin-bottom: 18px; color: var(--text);
        }

        .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }

        .form-label {
            font-size: 12px; font-weight: 600; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.4px; padding-left: 2px;
        }

        .form-input {
            width: 100%;
            padding: 13px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 14px;
            color: var(--text);
            background: var(--surface2);
            outline: none;
            transition: border-color 0.2s, background 0.2s;
            appearance: none;
        }

        .form-input:focus {
            border-color: var(--green-mid);
            background: var(--surface);
            box-shadow: 0 0 0 3px rgba(46,107,49,0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--green-dark);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 15px; font-weight: 700;
            cursor: pointer;
            margin-top: 6px;
            transition: all 0.2s;
            letter-spacing: 0.2px;
        }

        .submit-btn:active { transform: scale(0.98); background: var(--green-mid); }

        /* ── RECAP MODAL ── */
        .recap-section { margin-bottom: 20px; }

        .recap-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px;
        }

        .recap-badge {
            font-size: 11px; font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
        }

        .recap-badge.danger { background: var(--danger-bg); color: var(--danger); }
        .recap-badge.warn { background: var(--warn-bg); color: var(--warn); }
        .recap-badge.safe { background: var(--safe-bg); color: var(--safe); }

        .recap-label {
            font-size: 13px; font-weight: 700; color: var(--text);
        }

        .recap-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface2);
            margin-bottom: 6px;
            font-size: 13px; font-weight: 500;
        }

        .recap-item-dot {
            width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
        }

        .empty-note {
            font-size: 12px; color: var(--muted); font-style: italic; padding: 4px 2px;
        }

        .empty-state {
            text-align: center; padding: 40px 16px; color: var(--muted);
            font-size: 14px; font-weight: 500;
        }

        /* Category emoji map handled in JS */
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="app-header">
        <div class="header-left">
            <div class="logo-mark">O</div>
            <div>
                <div class="app-title">Stok Omaji</div>
                <div class="app-sub">Manajemen Bahan Baku</div>
            </div>
        </div>
        <div class="live-pill">
            <span class="live-dot"></span>
            LIVE
        </div>
    </header>

    <!-- CONTROLS BAR: filter + date sejajar -->
    <div class="controls-bar">
        <select class="ctrl-select" id="categoryFilter" onchange="setFilter(this.value)">
            <option value="Semua">🗂 Semua Kategori</option>
            <option value="Bahan Makanan">🍱 Bahan Makanan</option>
            <option value="Bahan Minuman">🧃 Bahan Minuman</option>
            <option value="Snack">🍟 Snack</option>
            <option value="Buah-buahan">🍓 Buah-buahan</option>
            <option value="Bumbu/Saus">🧂 Bumbu & Saus</option>
            <option value="Lainnya">📦 Lainnya</option>
        </select>
        <div class="ctrl-divider"></div>
        <input type="date" class="ctrl-date" id="globalReportDate">
    </div>

    <!-- STATS -->
    <div class="stats-row" id="statsRow" style="display:none;">
        <div class="stat-card aman" onclick="showStatDetail('Aman')">
            <div class="stat-num" id="statAman">0</div>
            <div class="stat-lbl">Aman</div>
        </div>
        <div class="stat-card warn" onclick="showStatDetail('Hampir Habis')">
            <div class="stat-num" id="statWarn">0</div>
            <div class="stat-lbl">Hampir Habis</div>
        </div>
        <div class="stat-card hbs" onclick="showStatDetail('Habis')">
            <div class="stat-num" id="statHabis">0</div>
            <div class="stat-lbl">Habis</div>
        </div>
    </div>

    <!-- LOADING -->
    <div id="loading">
        <div class="spinner"></div>
        Menghubungkan ke server...
    </div>

    <!-- STOCK LIST -->
    <div class="stock-list" id="stockList" style="display:none;"></div>

    <!-- FAB -->
    <button class="fab" onclick="openAddModal()" title="Tambah Bahan">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <button class="nav-btn" onclick="showRecap()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            Rekap Stok
        </button>
        <button class="nav-btn wa" onclick="sendReportToBoss()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
            Kirim ke Bos
        </button>
    </nav>

    <!-- FORM MODAL -->
    <div id="formModal" class="modal-overlay" onclick="handleOverlayClick(event, 'formModal')">
        <div class="modal-sheet">
            <div class="sheet-handle"></div>
            <div class="sheet-title" id="formModalTitle">Tambah Bahan</div>
            <div class="form-group">
                <label class="form-label">Nama Bahan</label>
                <input class="form-input" type="text" id="itemName" placeholder="Contoh: Gula Pasir">
            </div>
            <div class="form-group">
                <label class="form-label">Kategori</label>
                <select class="form-input" id="itemCategory">
                    <option value="" disabled selected>Pilih Kategori</option>
                    <option value="Bahan Makanan">Bahan Makanan</option>
                    <option value="Bahan Minuman">Bahan Minuman</option>
                    <option value="Snack">Snack</option>
                    <option value="Buah-buahan">Buah-buahan</option>
                    <option value="Bumbu/Saus">Bumbu & Saus</option>
                    <option value="Lainnya">Lainnya</option>
                </select>
            </div>
            <button class="submit-btn" id="submitBtn" onclick="submitForm()">Simpan Bahan</button>
        </div>
    </div>

    <!-- RECAP MODAL -->
    <div id="recapModal" class="modal-overlay" onclick="handleOverlayClick(event, 'recapModal')">
        <div class="modal-sheet">
            <div class="sheet-handle"></div>
            <div class="sheet-title">📊 Rekap Stok</div>
            <div id="recapBody"></div>
        </div>
    </div>

    <!-- STAT DETAIL MODAL -->
    <div id="statDetailModal" class="modal-overlay" onclick="handleOverlayClick(event, 'statDetailModal')">
        <div class="modal-sheet">
            <div class="sheet-handle"></div>
            <div class="sheet-title" id="statDetailTitle">Detail Stok</div>
            <div id="statDetailBody"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyACEjzDR7PyWXnflqtkkPeY5BGYRiwBHUk",
            authDomain: "stok-omaji.firebaseapp.com",
            databaseURL: "https://stok-omaji-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "stok-omaji",
            storageBucket: "stok-omaji.firebasestorage.app",
            messagingSenderId: "969026737214",
            appId: "1:969026737214:web:86cd42b70b5a9647f96d6f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'stokOmajiData');

        let inventory = [];
        let currentFilter = 'Semua';
        let editIndex = -1;

        const EMOJI = {
            "Bahan Makanan": "🍱",
            "Bahan Minuman": "🧃",
            "Snack": "🍟",
            "Buah-buahan": "🍓",
            "Bumbu/Saus": "🧂",
            "Lainnya": "📦"
        };

        const defaultIngredients = [
            { name: "Nasi Putih", category: "Bahan Makanan", status: "Aman" },
            { name: "Mie Telur / Instan", category: "Bahan Makanan", status: "Aman" },
            { name: "Kentang Beku", category: "Snack", status: "Aman" },
            { name: "Sosis", category: "Snack", status: "Aman" },
            { name: "Kecap Manis", category: "Bumbu/Saus", status: "Aman" },
            { name: "Minyak Goreng", category: "Bumbu/Saus", status: "Aman" },
            { name: "Susu Kental Manis", category: "Bahan Minuman", status: "Aman" },
            { name: "Kopi Hitam Bubuk", category: "Bahan Minuman", status: "Aman" }
        ];

        function getTodayYMD() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }
        document.getElementById('globalReportDate').value = getTodayYMD();

        onValue(dbRef, (snapshot) => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('stockList').style.display = 'flex';
            document.getElementById('statsRow').style.display = 'grid';
            const data = snapshot.val();
            inventory = data || defaultIngredients;
            if (!data) saveToFirebase();
            renderInventory();
        }, () => {
            document.getElementById('loading').innerHTML = '⚠️ Gagal terhubung ke server.';
        });

        function saveToFirebase() {
            set(dbRef, inventory).catch(e => alert("Gagal menyimpan: " + e.message));
        }

        function renderInventory() {
            const list = document.getElementById('stockList');
            list.innerHTML = '';

            const filtered = inventory.filter((item, i) => {
                item._origIndex = i;
                return currentFilter === 'Semua' || item.category === currentFilter;
            });

            // Stats dihitung dari filtered (sesuai filter kategori aktif)
            let aman = 0, warn = 0, habis = 0;
            filtered.forEach(i => {
                if (i.status === 'Aman') aman++;
                else if (i.status === 'Hampir Habis') warn++;
                else habis++;
            });
            document.getElementById('statAman').textContent = aman;
            document.getElementById('statWarn').textContent = warn;
            document.getElementById('statHabis').textContent = habis;

            if (filtered.length === 0) {
                list.innerHTML = `<div class="empty-state">Tidak ada bahan di kategori ini.</div>`;
                return;
            }

            filtered.forEach((item) => {
                const idx = item._origIndex;
                let cardClass = 'item-card';
                let btnClass = 'status-btn';
                let btnText = 'Aman';
                if (item.status === 'Hampir Habis') {
                    cardClass += ' warning-stock'; btnClass += ' hampir'; btnText = '⚠️ Hampir Habis';
                } else if (item.status === 'Habis') {
                    cardClass += ' danger-stock'; btnClass += ' habis'; btnText = '🔴 Habis';
                } else {
                    btnClass += ' aman'; btnText = '✅ Aman';
                }

                const card = document.createElement('div');
                card.className = cardClass;
                card.innerHTML = `
                    <div class="item-icon">${EMOJI[item.category] || '📦'}</div>
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-category">${item.category}</div>
                    </div>
                    <div class="item-right">
                        <button class="${btnClass}" onclick="cycleStatus(${idx})">${btnText}</button>
                        <button class="icon-btn edit-btn" onclick="editItem(${idx})">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </button>
                        <button class="icon-btn delete-btn" onclick="deleteItem(${idx})">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        </button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function haptic(type = 'light') {
            if (!navigator.vibrate) return;
            const patterns = { light: [10], medium: [20], heavy: [40], success: [10, 50, 10], error: [30, 20, 30] };
            navigator.vibrate(patterns[type] || patterns.light);
        }

        window.setFilter = function(cat) {
            haptic('light');
            currentFilter = cat;
            renderInventory();
        };

        window.openAddModal = function() {
            haptic('light');
            editIndex = -1;
            document.getElementById('itemName').value = '';
            document.getElementById('itemCategory').value = '';
            document.getElementById('formModalTitle').textContent = 'Tambah Bahan';
            document.getElementById('submitBtn').textContent = 'Simpan Bahan';
            document.getElementById('formModal').classList.add('open');
        };

        window.editItem = function(idx) {
            haptic('light');
            editIndex = idx;
            document.getElementById('itemName').value = inventory[idx].name;
            document.getElementById('itemCategory').value = inventory[idx].category;
            document.getElementById('formModalTitle').textContent = 'Edit Bahan';
            document.getElementById('submitBtn').textContent = 'Perbarui Bahan';
            document.getElementById('formModal').classList.add('open');
        };

        window.submitForm = function() {
            const name = document.getElementById('itemName').value.trim();
            const category = document.getElementById('itemCategory').value;
            if (!name || !category) { haptic('error'); alert('Lengkapi semua kolom ya!'); return; }
            if (editIndex >= 0) {
                inventory[editIndex].name = name;
                inventory[editIndex].category = category;
            } else {
                inventory.unshift({ name, category, status: 'Aman' });
            }
            haptic('success');
            saveToFirebase();
            document.getElementById('formModal').classList.remove('open');
        };

        window.cycleStatus = function(idx) {
            const s = inventory[idx].status;
            inventory[idx].status = s === 'Aman' ? 'Hampir Habis' : s === 'Hampir Habis' ? 'Habis' : 'Aman';
            const newStatus = inventory[idx].status;
            if (newStatus === 'Habis') haptic('heavy');
            else if (newStatus === 'Hampir Habis') haptic('medium');
            else haptic('light');
            saveToFirebase();
        };

        window.deleteItem = function(idx) {
            haptic('medium');
            if (confirm(`Hapus "${inventory[idx].name}"?`)) {
                haptic('heavy');
                inventory.splice(idx, 1);
                saveToFirebase();
            }
        };

        window.showStatDetail = function(statusFilter) {
            haptic('light');
            // Filter berdasarkan status DAN kategori aktif
            const items = inventory.filter(i =>
                i.status === statusFilter &&
                (currentFilter === 'Semua' || i.category === currentFilter)
            );
            const catLabel = currentFilter === 'Semua' ? 'Semua Kategori' : currentFilter;
            const cfg = {
                'Aman':         { icon: '✅', bg: 'var(--safe-bg)',   dot: '#2e7d32' },
                'Hampir Habis': { icon: '⚠️', bg: 'var(--warn-bg)',   dot: '#e65100' },
                'Habis':        { icon: '🔴', bg: 'var(--danger-bg)', dot: '#c62828' },
            }[statusFilter];

            document.getElementById('statDetailTitle').innerHTML =
                `${cfg.icon} ${statusFilter}
                <span style="font-size:12px;font-weight:500;color:var(--muted);display:block;margin-top:2px">${catLabel} · ${items.length} bahan</span>`;

            let html = '';
            if (items.length === 0) {
                html = `<div class="empty-state" style="padding:30px 0">Tidak ada bahan dengan status ini.</div>`;
            } else {
                items.forEach(i => {
                    html += `<div class="recap-item" style="border-color:${cfg.bg}; background:${cfg.bg}">
                        <span class="recap-item-dot" style="background:${cfg.dot}"></span>
                        <span style="font-weight:600;flex:1">${i.name}</span>
                        <span style="font-size:11px;color:var(--muted)">${i.category}</span>
                    </div>`;
                });
            }
            document.getElementById('statDetailBody').innerHTML = html;
            document.getElementById('statDetailModal').classList.add('open');
        };

        window.showRecap = function() {
            haptic('light');
            const habis = inventory.filter(i => i.status === 'Habis');
            const hampir = inventory.filter(i => i.status === 'Hampir Habis');
            const aman = inventory.filter(i => i.status === 'Aman');

            let html = '';

            const makeSection = (title, badgeClass, badgeTxt, dotColor, items, emptyMsg) => {
                let s = `<div class="recap-section">
                    <div class="recap-header">
                        <span class="recap-label">${title}</span>
                        <span class="recap-badge ${badgeClass}">${items.length} ${badgeTxt}</span>
                    </div>`;
                if (items.length > 0) {
                    items.forEach(i => {
                        s += `<div class="recap-item"><span class="recap-item-dot" style="background:${dotColor}"></span>${i.name} <span style="font-size:11px;color:var(--muted);margin-left:auto">${i.category}</span></div>`;
                    });
                } else {
                    s += `<div class="empty-note">${emptyMsg}</div>`;
                }
                return s + '</div>';
            };

            html += makeSection('🔴 Habis — Urgent', 'danger', 'item', '#c62828', habis, 'Tidak ada yang habis. Bagus!');
            html += makeSection('⚠️ Hampir Habis', 'warn', 'item', '#e65100', hampir, 'Tidak ada yang hampir habis.');
            html += makeSection('✅ Aman', 'safe', 'item', '#2e7d32', aman, '—');

            document.getElementById('recapBody').innerHTML = html;
            document.getElementById('recapModal').classList.add('open');
        };

        window.handleOverlayClick = function(e, id) {
            if (e.target === document.getElementById(id)) {
                haptic('light');
                document.getElementById(id).classList.remove('open');
            }
        };

        window.sendReportToBoss = function() {
            haptic('medium');
            const habis = inventory.filter(i => i.status === 'Habis');
            const hampir = inventory.filter(i => i.status === 'Hampir Habis');
            if (habis.length === 0 && hampir.length === 0) {
                alert('Semua bahan baku masih aman. Tidak ada yang perlu dilaporkan!');
                return;
            }
            const dateVal = document.getElementById('globalReportDate').value;
            const dateObj = new Date(dateVal);
            const fmt = !isNaN(dateObj) ? dateObj.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' }) : '';
            let text = `Halo, izin melaporkan update kondisi bahan baku Omaji.\n📅 *Tanggal Cek:* ${fmt}\n\n`;
            if (habis.length) text += `🚨 *SUDAH HABIS:*\n` + habis.map(i => `- ${i.name}`).join('\n') + '\n\n';
            if (hampir.length) text += `⚠️ *HAMPIR HABIS:*\n` + hampir.map(i => `- ${i.name}`).join('\n') + '\n\n';
            text += `Mohon arahannya untuk proses belanja/restock. Terima kasih! 🙏`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        };
    </script>
</body>
</html>
