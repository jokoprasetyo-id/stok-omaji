<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Stok Omaji - Glass Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        :root {
            --text-main: #2c3e50;
            --text-muted: #576574;
            --accent: #2e4c30; 
            --accent-hover: #1e3320;
            
            --safe: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --edit: #2980b9;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px 15px; 
            min-height: 100vh;
            color: var(--text-main);
            background: linear-gradient(-45deg, #e0eafc, #cfdef3, #d4fc79, #c8e6c9);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            box-sizing: border-box;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 25px;
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            height: fit-content;
            position: relative;
        }

        h2 {
            margin-top: 0;
            font-weight: 700;
            color: var(--text-main);
            padding-bottom: 15px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
            text-align: center;
            font-size: 22px;
        }

        /* Wrapper Kategori dan Tanggal Cek */
        .header-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .header-controls select, .header-controls input[type="date"] {
            flex: 1;
            padding: 12px 14px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.6);
            color: var(--text-main);
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            transition: all 0.3s ease;
        }

        .header-controls select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232c3e50' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
        }

        .header-controls select:focus, .header-controls input[type="date"]:focus,
        .header-controls select:hover, .header-controls input[type="date"]:hover {
            background-color: rgba(255, 255, 255, 0.6);
            border-color: var(--accent);
        }

        .header-controls select option {
            background: #ffffff;
            color: var(--text-main);
            font-weight: 500;
        }

        /* Stock List */
        .stock-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
            max-height: 55vh;
            overflow-y: auto;
            padding-right: 5px;
            padding-left: 2px;
        }

        .stock-list::-webkit-scrollbar { width: 6px; }
        .stock-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }

        .item-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            border-radius: 18px;
            transition: all 0.3s ease;
            border-left: 6px solid var(--safe);
        }

        .item-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        .item-card.warning-stock {
            border-left-color: var(--warning);
            background: rgba(243, 156, 18, 0.1);
        }

        .item-card.danger-stock {
            border-left-color: var(--danger);
            background: rgba(231, 76, 60, 0.1);
        }

        .item-info { display: flex; flex-direction: column; gap: 4px; }
        .item-name { font-weight: 600; font-size: 14px; letter-spacing: 0.3px; }
        
        .item-category {
            font-size: 10px; color: var(--text-muted); text-transform: uppercase;
            letter-spacing: 0.5px; font-weight: 600; background: rgba(0,0,0,0.05);
            padding: 3px 6px; border-radius: 6px; width: fit-content;
        }

        .item-controls { display: flex; align-items: center; gap: 6px; }

        .status-btn {
            padding: 8px 12px; font-size: 11px; border-radius: 20px; font-weight: 600;
            min-width: 90px; text-align: center; border: none; cursor: pointer;
            margin-right: 2px; transition: all 0.2s; font-family: inherit;
        }

        .status-btn.aman { background-color: rgba(39, 174, 96, 0.15); color: var(--safe); border: 1px solid rgba(39, 174, 96, 0.3); }
        .status-btn.hampir { background-color: var(--warning); color: white; box-shadow: 0 4px 10px rgba(243, 156, 18, 0.3); }
        .status-btn.habis { background-color: var(--danger); color: white; box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3); }

        .icon-btn {
            background: rgba(255,255,255,0.4); color: var(--text-muted);
            width: 32px; height: 32px; border-radius: 10px; display: flex; 
            align-items: center; justify-content: center; padding: 0; 
            border: 1px solid rgba(255,255,255,0.6); cursor: pointer; transition: all 0.2s ease;
        }

        .edit-btn:hover { color: var(--edit); background: white; transform: scale(1.05); }
        .delete-btn:hover { color: var(--danger); background: white; transform: scale(1.05); }

        /* Unified Footer Bar - REVISI ROUNDED */
        .unified-footer {
            display: flex;
            width: 100%;
            border-radius: 40px; /* Diperbesar agar sangat melengkung seperti pil */
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.7);
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            background: rgba(255, 255, 255, 0.2);
            margin-top: auto;
        }

        .unified-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 12px 5px;
            font-size: 11px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            color: var(--text-main);
            background: transparent;
        }

        .unified-btn svg { width: 20px; height: 20px; }

        .btn-recap { background: rgba(255, 255, 255, 0.6); border-right: 1px solid rgba(255,255,255,0.4); }
        .btn-recap:hover { background: rgba(255, 255, 255, 0.9); }

        .btn-add { 
            background: linear-gradient(135deg, var(--accent), #4a7c49); 
            color: white; 
            flex: 0.9; 
        }
        .btn-add svg { width: 28px; height: 28px; margin-bottom: 0; }
        .btn-add:hover { background: var(--accent-hover); }

        .btn-wa { background: rgba(37, 211, 102, 0.2); color: #128C7E; border-left: 1px solid rgba(255,255,255,0.4); }
        .btn-wa:hover { background: #25D366; color: white; }

        /* Modals */
        .modal {
            display: none; position: fixed; z-index: 999;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            align-items: center; justify-content: center;
            padding: 20px; box-sizing: border-box;
            opacity: 0; animation: fadeIn 0.3s forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        .modal-content {
            padding: 25px; border-radius: 28px; width: 100%; max-width: 400px;
            max-height: 85vh; overflow-y: auto; position: relative;
        }

        .close-modal {
            position: absolute; right: 20px; top: 20px;
            color: var(--text-muted); font-size: 20px;
            font-weight: bold; cursor: pointer; width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.5); border-radius: 50%; transition: all 0.2s;
        }
        .close-modal:hover { background: var(--danger); color: white; }

        .modal-form { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
        
        .input-label {
            font-size: 12px; font-weight: 600; color: var(--text-main);
            margin-bottom: -6px; padding-left: 5px;
        }

        .modal-form input, .modal-form select {
            padding: 14px; border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.8); background: rgba(255,255,255,0.6);
            font-family: inherit; font-size: 13px; outline: none; transition: all 0.3s;
        }
        .modal-form input:focus, .modal-form select:focus {
            background: white; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(46,76,48,0.1);
        }
        .submit-btn {
            background: var(--accent); color: white;
            padding: 14px; border-radius: 14px; border: none;
            font-weight: 600; font-size: 14px; cursor: pointer;
            margin-top: 10px; transition: all 0.2s; font-family: inherit;
        }
        .submit-btn:hover { background: var(--accent-hover); }

        .recap-section { margin-bottom: 20px; }
        .recap-title { font-weight: 600; font-size: 13px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .recap-list { list-style-type: none; padding: 0; margin: 0; font-size: 12px; }
        .recap-list li {
            padding: 10px 15px; background: rgba(255,255,255,0.5);
            margin-bottom: 6px; border-radius: 12px;
            display: flex; justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.4);
        }
        .empty-text { color: var(--text-muted); font-style: italic; font-size: 12px; padding: 4px 0; }
    </style>
</head>
<body>

    <div class="container glass">
        <h2>✨ Stok Omaji</h2>

        <div class="header-controls">
            <select id="categoryFilter" onchange="setFilter(this.value)">
                <option value="Semua">Semua Kategori</option>
                <option value="Bahan Makanan">Bahan Makanan</option>
                <option value="Bahan Minuman">Bahan Minuman</option>
                <option value="Snack">Snack</option>
                <option value="Buah-buahan">Buah-buahan</option>
                <option value="Bumbu/Saus">Bumbu & Saus</option>
                <option value="Lainnya">Lainnya</option>
            </select>
            
            <input type="date" id="globalReportDate" title="Tanggal Cek Stok">
        </div>

        <div class="stock-list" id="stockList">
            </div>

        <div class="unified-footer">
            <button class="unified-btn btn-recap" onclick="showRecap()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                <span>Rekap</span>
            </button>
            <button class="unified-btn btn-add" onclick="openAddModal()" title="Tambah Bahan">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
            <button class="unified-btn btn-wa" onclick="sendReportToBoss()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                <span>Kirim WA</span>
            </button>
        </div>
    </div>

    <div id="formModal" class="modal">
        <div class="modal-content glass">
            <span class="close-modal" onclick="closeFormModal()">&times;</span>
            <h3 id="formModalTitle" style="margin-top:0; font-size:18px;">Tambah Bahan</h3>
            
            <form id="stockForm" class="modal-form">
                <label class="input-label">Nama Bahan</label>
                <input type="text" id="itemName" placeholder="Contoh: Gula Pasir" required>
                
                <label class="input-label">Kategori</label>
                <select id="itemCategory" required>
                    <option value="" disabled selected>Pilih Kategori</option>
                    <option value="Bahan Makanan">Bahan Makanan</option>
                    <option value="Bahan Minuman">Bahan Minuman</option>
                    <option value="Snack">Snack</option>
                    <option value="Buah-buahan">Buah-buahan</option>
                    <option value="Bumbu/Saus">Bumbu & Saus</option>
                    <option value="Lainnya">Lainnya</option>
                </select>

                <button type="submit" class="submit-btn" id="submitBtn">Simpan Bahan</button>
            </form>
        </div>
    </div>

    <div id="recapModal" class="modal">
        <div class="modal-content glass">
            <span class="close-modal" onclick="closeRecap()">&times;</span>
            <h3 style="margin-top:0; font-size:18px;">📊 Rekap Stok</h3>
            <div id="recapBody"></div>
        </div>
    </div>

    <script>
        // Set Default Global Date Hari Ini
        function getTodayYMD() {
            const d = new Date();
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }
        document.getElementById('globalReportDate').value = getTodayYMD();

        const defaultIngredients = [
            { name: "Nasi Putih", category: "Bahan Makanan", status: "Aman" },
            { name: "Mie Telur / Instan", category: "Bahan Makanan", status: "Aman" },
            { name: "Kentang Beku", category: "Snack", status: "Aman" },
            { name: "Dimsum Beku", category: "Snack", status: "Aman" },
            { name: "Sosis", category: "Snack", status: "Aman" },
            { name: "Kecap Manis", category: "Bumbu/Saus", status: "Aman" },
            { name: "Saus Sambal", category: "Bumbu/Saus", status: "Aman" },
            { name: "Minyak Goreng", category: "Bumbu/Saus", status: "Aman" },
            { name: "Tepung Bumbu", category: "Bumbu/Saus", status: "Aman" },
            { name: "Susu Kental Manis", category: "Bahan Minuman", status: "Aman" },
            { name: "Kopi Hitam Bubuk", category: "Bahan Minuman", status: "Aman" },
            { name: "Sirup (Soda Gembira)", category: "Bahan Minuman", status: "Aman" },
            { name: "Es Batu", category: "Lainnya", status: "Aman" },
            { name: "Gas LPG", category: "Lainnya", status: "Aman" }
        ];

        let inventory = JSON.parse(localStorage.getItem('stokOmajiGlassV4'));
        if (!inventory || inventory.length === 0) {
            inventory = defaultIngredients;
            saveToLocalStorage();
        }

        let currentFilter = 'Semua';
        let editIndex = -1; 

        const formModal = document.getElementById('formModal');
        const stockForm = document.getElementById('stockForm');
        const formModalTitle = document.getElementById('formModalTitle');
        const stockList = document.getElementById('stockList');
        const categoryFilterDropdown = document.getElementById('categoryFilter');

        function saveToLocalStorage() {
            localStorage.setItem('stokOmajiGlassV4', JSON.stringify(inventory));
        }

        window.setFilter = function(category) {
            currentFilter = category;
            renderInventory();
        }

        function renderInventory() {
            stockList.innerHTML = '';
            let displayedCount = 0;

            inventory.forEach((item, index) => {
                if (currentFilter !== 'Semua' && item.category !== currentFilter) return; 
                displayedCount++;

                let cardClass = 'item-card glass'; 
                let btnClass = 'status-btn';
                let btnText = 'Aman';

                if (item.status === 'Hampir Habis') {
                    cardClass += ' warning-stock'; btnClass += ' hampir'; btnText = 'Hampir Habis';
                } else if (item.status === 'Habis') {
                    cardClass += ' danger-stock'; btnClass += ' habis'; btnText = 'Habis';
                } else {
                    btnClass += ' aman';
                }

                const card = document.createElement('div');
                card.className = cardClass;

                card.innerHTML = `
                    <div class="item-info">
                        <span class="item-name">${item.name}</span>
                        <span class="item-category">${item.category}</span>
                    </div>
                    <div class="item-controls">
                        <button class="${btnClass}" onclick="cycleStatus(${index})">${btnText}</button>
                        <button class="icon-btn edit-btn" onclick="editItem(${index})" title="Edit Item">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        </button>
                        <button class="icon-btn delete-btn" onclick="deleteItem(${index})" title="Hapus Item">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    </div>
                `;
                stockList.appendChild(card);
            });

            if (displayedCount === 0) {
                stockList.innerHTML = `<div style="text-align:center; color:var(--text-muted); padding: 20px; font-weight:500;">Kategori "${currentFilter}" kosong.</div>`;
            }
        }

        window.openAddModal = function() {
            editIndex = -1;
            stockForm.reset();
            formModalTitle.innerText = "Tambah Bahan";
            formModal.style.display = "flex";
            document.getElementById('itemName').focus();
        }

        window.editItem = function(index) {
            editIndex = index;
            document.getElementById('itemName').value = inventory[index].name;
            document.getElementById('itemCategory').value = inventory[index].category;
            formModalTitle.innerText = "Edit Bahan";
            formModal.style.display = "flex";
        }

        window.closeFormModal = function() { formModal.style.display = "none"; }

        stockForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('itemName').value;
            const category = document.getElementById('itemCategory').value;

            if (editIndex >= 0) {
                inventory[editIndex].name = name;
                inventory[editIndex].category = category;
            } else {
                inventory.unshift({ name, category, status: 'Aman' });
                categoryFilterDropdown.value = 'Semua';
                setFilter('Semua'); 
            }

            saveToLocalStorage();
            renderInventory();
            closeFormModal();
        });

        window.cycleStatus = function(index) {
            const current = inventory[index].status;
            inventory[index].status = current === 'Aman' ? 'Hampir Habis' : current === 'Hampir Habis' ? 'Habis' : 'Aman';
            saveToLocalStorage();
            renderInventory();
        }

        window.deleteItem = function(index) {
            if (confirm(`Hapus ${inventory[index].name} dari daftar?`)) {
                inventory.splice(index, 1);
                saveToLocalStorage();
                renderInventory();
            }
        }

        const recapModal = document.getElementById('recapModal');
        
        window.showRecap = function() {
            const habis = inventory.filter(i => i.status === 'Habis');
            const hampir = inventory.filter(i => i.status === 'Hampir Habis');
            
            const recapBody = document.getElementById('recapBody');
            let html = '';

            html += `
            <div class="recap-section">
                <div class="recap-title" style="color: var(--danger)">
                    <span>🔴 Habis (Urgent)</span><span>${habis.length} item</span>
                </div>
                ${habis.length > 0 
                    ? `<ul class="recap-list">${habis.map(i => `<li><span>${i.name}</span></li>`).join('')}</ul>` 
                    : `<div class="empty-text">Aman, tidak ada yang habis.</div>`
                }
            </div>`;

            html += `
            <div class="recap-section">
                <div class="recap-title" style="color: var(--warning)">
                    <span>⚠️ Hampir Habis</span><span>${hampir.length} item</span>
                </div>
                ${hampir.length > 0 
                    ? `<ul class="recap-list">${hampir.map(i => `<li><span>${i.name}</span></li>`).join('')}</ul>` 
                    : `<div class="empty-text">Kosong.</div>`
                }
            </div>`;

            recapBody.innerHTML = html;
            recapModal.style.display = 'flex';
        }

        window.closeRecap = function() { recapModal.style.display = 'none'; }

        window.onclick = function(event) {
            if (event.target == recapModal) recapModal.style.display = "none";
            if (event.target == formModal) formModal.style.display = "none";
        }

        window.sendReportToBoss = function() {
            const habis = inventory.filter(i => i.status === 'Habis');
            const hampir = inventory.filter(i => i.status === 'Hampir Habis');
            
            if (habis.length === 0 && hampir.length === 0) {
                alert('Semua bahan baku masih aman, tidak ada yang perlu dilaporkan.');
                return;
            }

            // Ambil input tanggal global yang dipilih pengguna
            const selectedDateValue = document.getElementById('globalReportDate').value;
            const dateObj = new Date(selectedDateValue);
            
            // Format agar cantik: 13 April 2026
            const optionsDate = { day: 'numeric', month: 'long', year: 'numeric' };
            const formattedDate = !isNaN(dateObj) ? dateObj.toLocaleDateString('id-ID', optionsDate) : selectedDateValue;

            let text = `Halo, izin melaporkan update kondisi bahan baku Omaji.\n📅 *Tanggal Cek:* ${formattedDate}\n\n`;

            if (habis.length > 0) {
                text += `🚨 *SUDAH HABIS:*\n`;
                habis.forEach(item => text += `- ${item.name}\n`);
                text += `\n`;
            }

            if (hampir.length > 0) {
                text += `⚠️ *HAMPIR HABIS:*\n`;
                hampir.forEach(item => text += `- ${item.name}\n`);
                text += `\n`;
            }

            text += `Mohon arahannya untuk proses belanja/restock. Terima kasih! 🙏`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        renderInventory();
    </script>
</body>
</html>
